name: Create new version release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to be released in the format vMAJOR.MINOR (e.g., v1.2)'
        required: true
        type: string

jobs:
  set-version-tag:
    name: Set correct version for consistency across repo files
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Check version
        uses: access-nri/actions/.github/actions/version-check@main
        with:
          version: ${{ inputs.version }}
          prefix: 'v'
          versioning-scheme: 'semver-major-minor'

      # Set the correct version to be used in the workflow files
      - name: Set correct version
        run: |
          # Set the version for all actions and workflows from this repository referenced 
          # in templates, workflows, and actions to match this workflow’s input version.
          # 
          # Set regex
          regex+='(' # Open 1st capturing group 
          regex+='uses:[[:space:]]+access-nri\/documentation-infra\/\.github\/' # Match the string 'uses: access-nri/documentation-infra/.github/'
          regex+='(actions\/rtd-build-status|workflows\/check_links_workflow\.yml)' # 2nd capturing group matching either 'actions\/rtd-build-status' or 'workflows/check_links_workflow.yml'
          regex+='@)' # Match '@' and close 1st capturing group
          regex+='[^[:space:]]+' # Match anything but spaces (i.e., the version specification, e.g., 'v1.2' or 'main')
          # Replace the version specification with the input version for all matches in the specified files
          # Using % as sed command separator to avoid issues with slashes in file paths
          find .github/actions .github/workflows templates \
            -type f -name "*.yml" \
            ! -path '.github/workflows/create_release.yml' | \
            while read -r file; do
              if grep -qE "$regex" "$file"; then
                echo "=== $file ==="
                echo "  BEFORE: $(grep -nE "$regex" "$file")"
                sed -Ei "s%$regex%\1${{ inputs.version }}%g" "$file"
                echo "  AFTER:  $(grep -n "${{ inputs.version }}" "$file")"
              fi
            done

      - name: Commit changes and create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -u
            git commit -m "Automatically updated version references to '${{ inputs.version }}'" \
              -m 'Commit issued as part of the ${{ github.workflow }} workflow.'
            git push
          fi
          git tag '${{ inputs.version }}' -m 'Tag automatically generated by the ${{ github.workflow }} workflow.'
          git push origin '${{ inputs.version }}'

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: set-version-tag
    permissions:
      contents: write
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b #v2.5.0
        with:
          tag_name: '${{ inputs.version }}'
          name: '${{ inputs.version }}'
          generate_release_notes: true